<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mObywatel Demo</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #e5e7eb;
}

/* LOCK SCREEN */
.lock-screen {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #0f172a;
  color: white;
}

.pin {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #334155;
}

.keypad {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 15px;
}

.key {
  background: #1e293b;
  padding: 20px;
  text-align: center;
  border-radius: 50%;
  font-size: 20px;
}

/* APP */
.app {
  display: none;
}

/* HEADER */
.header {
  padding: 15px;
  text-align: center;
  font-weight: 600;
  font-size: 18px;
}

/* CARD (dowód) */
.id-card {
  margin: 15px;
  border-radius: 20px;
  padding: 20px;
  background: linear-gradient(135deg, #f8fafc, #e2e8f0);
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  position: relative;
}

.id-top {
  display: flex;
  gap: 15px;
}

/* zdjęcie */
.photo {
  width: 90px;
  height: 110px;
  background: #cbd5f5;
  border-radius: 10px;
}

/* dane */
.data {
  flex: 1;
}

.name {
  font-size: 18px;
  font-weight: bold;
}

.label {
  font-size: 12px;
  color: #64748b;
}

.value {
  font-size: 14px;
  margin-bottom: 5px;
}

/* flaga */
.flag {
  width: 40px;
  height: 25px;
  background: linear-gradient(to bottom, white 50%, red 50%);
  margin-top: 10px;
  border-radius: 4px;
}

/* status */
.status {
  margin-top: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: #2563eb;
  font-size: 14px;
}

.check {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  border: 2px solid #2563eb;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* dolna sekcja */
.bottom {
  margin: 15px;
  padding: 15px;
  background: white;
  border-radius: 15px;
  font-size: 14px;
}

/* NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #e5e7eb;
}
</style>
</head>

<body>

<!-- PIN -->
<div class="lock-screen" id="lock">
  <h2>Wprowadź PIN</h2>

  <div class="pin">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="keypad">
    <div class="key" onclick="press(1)">1</div>
    <div class="key" onclick="press(2)">2</div>
    <div class="key" onclick="press(3)">3</div>
    <div class="key" onclick="press(4)">4</div>
    <div class="key" onclick="press(5)">5</div>
    <div class="key" onclick="press(6)">6</div>
    <div class="key" onclick="press(7)">7</div>
    <div class="key" onclick="press(8)">8</div>
    <div class="key" onclick="press(9)">9</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="header">mObywatel</div>

  <div class="id-card">
    <div class="id-top">
      <div class="photo"></div>

      <div class="data">
        <div class="name">JAN</div>
        <div class="label">Imiona</div>

        <div class="name">KOWALSKI</div>
        <div class="label">Nazwisko</div>

        <div class="value">00000000000</div>
        <div class="label">PESEL</div>

        <div class="value">01.01.1990</div>
        <div class="label">Data urodzenia</div>

        <div class="flag"></div>
      </div>
    </div>

    <div class="status">
      <div class="check">✔</div>
      Dokument ważny
    </div>
  </div>

  <div class="bottom">
    Numer dowodu: ABC123123
  </div>

  <div class="bottom-nav">
    <div>🏠</div>
    <div>📄</div>
    <div>☰</div>
  </div>

</div>

<script>
let entered = "";

function press(num) {
  entered += num;

  let dots = document.querySelectorAll(".dot");
  dots[entered.length - 1].style.background = "white";

  if (entered.length === 4) {
    setTimeout(() => {
      document.getElementById("lock").style.display = "none";
      document.getElementById("app").style.display = "block";
    }, 300);
  }
}
</script>

</body>
</html>
